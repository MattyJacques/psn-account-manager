<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PSN Account Manager</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">P</div>
      <span class="brand-name">PSN</span>
      <span class="brand-sep">/</span>
      <span class="brand-sub">Accounts</span>
    </div>
    <button type="button" id="addBtn" class="add-btn">
      <svg class="add-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New
    </button>
  </header>

  <main>
    <form id="accountForm" class="account-form hidden" autocomplete="off">
      <input type="hidden" id="editId" value="" />
      <div class="form-header">
        <span id="formTitle" class="form-title">New account</span>
        <button type="button" id="cancelBtn" class="cancel-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="form-fields">
        <label class="field-group">
          <span class="field-label">PSN ID <span class="optional">optional</span></span>
          <input type="text" id="label" placeholder="e.g. Main, Alt, JP Store" maxlength="40" />
        </label>
        <label class="field-group">
          <span class="field-label">Email</span>
          <input type="email" id="email" placeholder="account@example.com" required maxlength="120" />
        </label>
        <label class="field-group">
          <span class="field-label">Password</span>
          <input type="password" id="password" required maxlength="120" />
        </label>
      </div>
      <div class="form-footer">
        <p id="formError" class="error hidden"></p>
        <button type="submit" id="saveBtn" class="primary-btn">Save</button>
      </div>
    </form>

    <div class="group-label" id="groupLabel" aria-live="polite"></div>
    <div id="accountList"></div>
    <p id="emptyState" class="empty-state hidden">No accounts yet — click New to add one.</p>
  </main>

  <footer>
    <span class="footer-stat" id="footerStat"></span>
    <div class="footer-actions">
      <button type="button" id="exportBtn" class="link-btn">Export</button>
      <button type="button" id="importBtn" class="link-btn">Import</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
