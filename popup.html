<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PSN Account Manager</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">PSN</div>
      <h1>Account Manager</h1>
    </div>
    <button type="button" id="addBtn" class="add-btn">+ Add</button>
  </header>

  <main>
    <form id="accountForm" class="hidden" autocomplete="off">
      <h2 id="formTitle">Add account</h2>
      <input type="hidden" id="editId" value="" />

      <label>
        <span>PSN ID (optional)</span>
        <input type="text" id="label" placeholder="e.g. Main, Alt, JP store" maxlength="40" />
      </label>

      <label>
        <span>Email</span>
        <input type="email" id="email" placeholder="account@example.com" required maxlength="120" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" id="password" required maxlength="120" />
      </label>

      <div class="form-actions">
        <button type="submit" id="saveBtn" class="primary">Save</button>
      </div>

      <p id="formError" class="error hidden"></p>
    </form>

    <div class="account-list-wrap" id="accountListWrap">
      <table class="account-table">
        <thead>
          <tr>
            <th>PSN ID</th>
            <th>Email</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="accountList" aria-live="polite"></tbody>
      </table>
    </div>

    <p id="emptyState" class="empty-state hidden">
      No accounts yet. Add your first one below.
    </p>
  </main>

  <footer>
    <button type="button" id="exportBtn" class="link-btn">Export</button>
    <span class="dot">·</span>
    <button type="button" id="importBtn" class="link-btn">Import</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </footer>

  <script src="popup.js"></script>
</body>
</html>
