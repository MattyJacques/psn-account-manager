<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PSN Account Manager</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">PSN</div>
      <h1>Account Manager</h1>
    </div>
    <div class="counter"><span id="count">0</span>/10</div>
  </header>

  <main>
    <ul id="accountList" class="account-list" aria-live="polite"></ul>

    <p id="emptyState" class="empty-state hidden">
      No accounts yet. Add your first one below.
    </p>

    <form id="accountForm" autocomplete="off">
      <h2 id="formTitle">Add account</h2>
      <input type="hidden" id="editId" value="" />

      <label>
        <span>Label (optional)</span>
        <input type="text" id="label" placeholder="e.g. Main, Alt, JP store" maxlength="40" />
      </label>

      <label>
        <span>Email</span>
        <input type="email" id="email" placeholder="account@example.com" required maxlength="120" />
      </label>

      <label>
        <span>Password</span>
        <div class="password-row">
          <input type="password" id="password" required maxlength="120" />
          <button type="button" id="togglePwd" class="icon-btn" title="Show/hide">Show</button>
        </div>
      </label>

      <div class="form-actions">
        <button type="submit" id="saveBtn" class="primary">Save</button>
        <button type="button" id="cancelBtn" class="secondary hidden">Cancel</button>
      </div>

      <p id="formError" class="error hidden"></p>
    </form>
  </main>

  <footer>
    <button type="button" id="exportBtn" class="link-btn">Export</button>
    <span class="dot">·</span>
    <button type="button" id="importBtn" class="link-btn">Import</button>
    <span class="dot">·</span>
    <button type="button" id="clearAllBtn" class="link-btn danger">Clear all</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </footer>

  <p class="warning">
    Stored locally in this browser. Anyone with access to this profile can read these credentials.
  </p>

  <script src="popup.js"></script>
</body>
</html>
