<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PSN Account Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">P</div>
      <span class="brand-name">PSN</span>
      <span class="brand-sub">/ Accounts</span>
    </div>
    <button type="button" id="addBtn" class="add-btn">+ New</button>
  </header>

  <main>
    <form id="accountForm" class="account-form hidden" autocomplete="off">
      <input type="hidden" id="editId" value="" />
      <div class="form-header">
        <span id="formTitle" class="form-title">New account</span>
        <button type="button" id="cancelBtn" class="close-btn" aria-label="Close">✕</button>
      </div>
      <label class="field-group">
        <span class="field-label">Label</span>
        <input type="text" id="label" placeholder="My account nickname" maxlength="40" />
      </label>
      <label class="field-group">
        <span class="field-label">Email</span>
        <input type="email" id="email" class="mono" placeholder="you@example.com" required maxlength="120" />
      </label>
      <label class="field-group">
        <span class="field-label">Password</span>
        <input type="password" id="password" class="mono" placeholder="••••••••••" maxlength="120" />
      </label>
      <p id="formError" class="error hidden"></p>
      <div class="form-actions">
        <button type="button" id="cancelBtn2" class="ghost-btn">Cancel</button>
        <button type="submit" id="saveBtn" class="primary-btn">Save</button>
      </div>
    </form>

    <div class="group-label" id="groupLabel" aria-live="polite"></div>
    <div id="accountList" class="account-list hidden"></div>
    <p id="emptyState" class="empty-state hidden">No accounts yet — click + New to add one.</p>
  </main>

  <footer>
    <span class="footer-stat" id="footerStat"></span>
    <div class="footer-actions">
      <button type="button" id="exportBtn" class="link-btn">Export</button>
      <button type="button" id="importBtn" class="link-btn">Import</button>
      <input type="file" id="importFile" accept="text/csv,.csv" hidden />
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
